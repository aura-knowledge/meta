objectives:
  - Publish the "Attention, Substance, and the AI Moment" article series on aura-knowledge.github.io.
  - Expand the series from its seed set to 50 articles with cross-links and data visualizations.
  - Create and refine a standalone TLDR entry-point article for readers who want the core argument first.
  - Add structural bookmarks and a journey narrative to the series guide.
  - Address post-publication review findings (visualizations and sibling-agent P1 items).
  - Enforce SDL commit-author provenance across the site and meta repositories.
completion_criteria:
  - All referenced pull requests (#92-#101 on the site, #50 on meta) are merged.
  - Series content, TLDR article, and visualizations are live on the public site.
  - SDL-Commit-Author trailer is appended to every new commit by the commit-msg hook in both repos.
  - No private session content, prompts, or personal data leak into public files.
  - Retroactive SDL lifecycle record is filed in meta/registry/telemetry/.
agents_involved:
  - role: human-operator
    identity: v-i-s-h-a-l
    responsibilities:
      - Directed session goals and approved publication scope.
      - Merged pull requests and enabled the commit-msg hook.
  - role: content-publisher
    identity: aura-knowledge/article-lifecycle-router
    responsibilities:
      - Drafted, expanded, and cross-linked the 50-article series.
      - Produced SVG/Mermaid visualizations and the TLDR article.
  - role: review-agent
    identity: sibling-agent reviewer
    responsibilities:
      - Flagged visualization and ordering issues after initial publication.
  - role: provenance-hook
    identity: capability-commit-author
    responsibilities:
      - Appended SDL-Commit-Author trailers to commits.
      - Updated AGENTS.md with hook instructions.
key_decisions:
  - decision: Expand the seed series to 50 articles across six arcs.
    rationale: A single, comprehensive arc provides a durable public reference and supports the article-series index UX.
    evidence_ref: aura-knowledge/aura-knowledge.github.io#92
  - decision: Add a standalone TLDR article instead of making it chapter 50.
    rationale: The TLDR serves as an entry point for readers who will not read the full series; it must not be buried as the final chapter.
    evidence_ref: aura-knowledge/aura-knowledge.github.io#97
  - decision: Rewrite the TLDR as a personal-responsibility essay and broaden it to all ages.
    rationale: Reader feedback showed the original framing was too narrow; a direct, age-agnostic call to action is more useful.
    evidence_ref: aura-knowledge/aura-knowledge.github.io#98, aura-knowledge/aura-knowledge.github.io#99
  - decision: Add data visualizations to the TLDR.
    rationale: Charts make the opportunity-cost argument concrete and shareable.
    evidence_ref: aura-knowledge/aura-knowledge.github.io#100
  - decision: Enforce SDL-Commit-Author trailers via a commit-msg hook in both repos.
    rationale: Retroactive governance requires durable provenance on every commit for SDL lifecycle compliance.
    evidence_ref: aura-knowledge/aura-knowledge.github.io#101, aura-knowledge/meta#50
