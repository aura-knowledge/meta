name: Human triage fallback

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    if: >-
      !contains(github.event.issue.labels.*.name, 'article-proposal') &&
      !contains(github.event.issue.labels.*.name, 'org-feedback')
    steps:
      - name: Label and comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['human-triage']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'This issue does not match a known submission lane. Please use the article-proposal or org-feedback issue form. Do not add private, proprietary, or client-specific details while it is triaged.'
            });
