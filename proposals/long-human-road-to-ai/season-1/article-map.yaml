reading_path:
- order: 1
  slug: before-machines
  title: 'Before Machines: Calculation, Automata, and the Dream of Mechanical Reason'
  package_path: proposals/long-human-road-to-ai/articles/before-machines
  issue: 6
  role: Establish computation as human labor, external state, artifacts, mechanisms,
    and organized procedure.
  reader_question: How did people extend calculation and memory before electronic
    computers?
  bridge_from_previous: null
  bridge_to_next: Formal logic asks what happens when procedure and symbol manipulation
    become precise enough to reason about.
  key_claim_ids:
  - claim-human-computation-labor
  - claim-external-state
  - claim-decompose-work
  - claim-babbage-threshold
  - claim-reasoning-as-calculation
  recurring_patterns:
  - external_memory
  - mechanized_calculation
  - hidden_labor
  - procedure
  visual_priority:
  - artifact-to-abstraction ladder
  - human labor and tool stack
- order: 2
  slug: formal-logic-to-computation
  title: 'From Formal Logic to Computation: The Mathematical Road to AI'
  package_path: proposals/long-human-road-to-ai/articles/formal-logic-to-computation
  issue: 7
  role: Show how symbols, effective procedure, computability, circuits, information,
    and feedback made machine computation legible.
  reader_question: How can reasoning or procedure become something a machine can represent?
  bridge_from_previous: Mechanical aids and tables become more powerful when their
    procedures are explicit and inspectable.
  bridge_to_next: Early AI tries to make reasoning executable by encoding problems,
    search, and inference in programs.
  key_claim_ids:
  - claim-001
  - claim-005
  - claim-007
  - claim-008
  - claim-009
  - claim-011
  recurring_patterns:
  - formal_symbols
  - effective_methods
  - digital_logic
  - feedback
  visual_priority:
  - symbols to circuits bridge
  - analogy boundary boxes
- order: 3
  slug: birth-of-ai
  title: 'The Birth of AI: Dartmouth, Symbolic Systems, and Early Optimism'
  package_path: proposals/long-human-road-to-ai/articles/birth-of-ai
  issue: 8
  role: Explain field formation, symbolic AI, early demonstrations, and optimism without
    collapsing all origins into one event.
  reader_question: Why did people believe machines might do intelligent work?
  bridge_from_previous: Computability and digital computers made formal reasoning
    executable enough to become a research program.
  bridge_to_next: Optimistic demonstrations met evaluation, funding, domain, and maintenance
    limits.
  key_claim_ids:
  - CLAIM-BAI-001
  - CLAIM-BAI-002
  - CLAIM-BAI-003
  - CLAIM-BAI-004
  - CLAIM-BAI-005
  recurring_patterns:
  - field_formation
  - symbolic_reasoning
  - search
  - institutional_optimism
  visual_priority:
  - Dartmouth as meeting point, not origin point
  - symbolic AI pipeline
- order: 4
  slug: ai-winters-expert-systems
  title: Winters, Expert Systems, and the Cost of Overpromising Intelligence
  package_path: proposals/long-human-road-to-ai/articles/ai-winters-expert-systems
  issue: 9
  role: Turn AI winter into a story about evaluation, expectations, narrow-domain
    usefulness, maintenance, and institutional confidence.
  reader_question: What happens when a field's promises are tested against real costs
    and use cases?
  bridge_from_previous: Early ambition made evaluation and institutional trust unavoidable.
  bridge_to_next: When hand-coded expertise proved costly to maintain, learning from
    examples became more attractive.
  key_claim_ids:
  - claim-aiw-001
  - claim-aiw-002
  - claim-aiw-003
  - claim-aiw-004
  - claim-aiw-005
  recurring_patterns:
  - evaluation
  - maintenance
  - domain_limits
  - institutional_confidence
  visual_priority:
  - expectation versus evidence loop
  - then and now evaluation table
- order: 5
  slug: learning-machines
  title: 'Learning Machines: Statistics, Neural Networks, and the Data Turn'
  package_path: proposals/long-human-road-to-ai/articles/learning-machines
  issue: 10
  role: Explain statistical learning, neural networks, backpropagation, benchmarks,
    data, GPUs, and generalization.
  reader_question: What changes when machines improve behavior from examples instead
    of only following hand-written rules?
  bridge_from_previous: Expert systems exposed the cost of encoding knowledge by hand;
    learning systems shift effort toward data, training, and evaluation.
  bridge_to_next: Once data, compute, and model scale become central, general-purpose
    models become plausible.
  key_claim_ids:
  - claim-lm-001
  - claim-lm-002
  - claim-lm-003
  - claim-lm-007
  - claim-lm-008
  - claim-lm-010
  recurring_patterns:
  - learning_from_examples
  - generalization
  - benchmarks
  - compute_scaling
  visual_priority:
  - rules to learning contrast
  - data, model, benchmark loop
- order: 6
  slug: foundation-models
  title: Foundation Models and the Return of General-Purpose AI Systems
  package_path: proposals/long-human-road-to-ai/articles/foundation-models
  issue: 11
  role: Explain transformers, scaling, foundation models, retrieval, tools, post-training,
    multimodality, and governance boundaries.
  reader_question: Why do recent AI systems feel more general than earlier specialized
    systems?
  bridge_from_previous: Learning systems improved with data, compute, and benchmarks;
    foundation models generalize that scaling logic across tasks and media.
  bridge_to_next: General-purpose capability shifts the central question from what
    the model can do to where and how society should rely on it.
  key_claim_ids:
  - claim-fm-def
  - claim-gp-return
  - claim-transformer
  - claim-pretrain
  - claim-scale
  - claim-tools
  - claim-eval-risk
  recurring_patterns:
  - scaling
  - general_purpose_models
  - tool_use
  - governance
  visual_priority:
  - model lifecycle stack
  - capability, risk, and governance matrix
- order: 7
  slug: human-systems
  title: 'The Human Road Through AI: Labor, Institutions, Governance, and Meaning'
  package_path: proposals/long-human-road-to-ai/articles/human-systems
  issue: 12
  role: Close the season by showing that AI outcomes depend on labor, institutions,
    education, access, infrastructure, governance, and trust.
  reader_question: What human systems decide whether AI becomes useful, harmful, fair,
    trusted, or wasteful?
  bridge_from_previous: Foundation models create broader deployment surfaces, so institutions
    and public trust become part of the technology.
  bridge_to_next: null
  key_claim_ids:
  - claim-human-001
  - claim-human-002
  - claim-human-003
  - claim-human-004
  - claim-human-005
  - claim-human-006
  recurring_patterns:
  - labor
  - institutions
  - governance
  - access
  - trust
  visual_priority:
  - hidden labor and infrastructure stack
  - trust triangle
