    - formal-logic-to-computation
    - human-systems
  explicit_rules:
    description: Rules move from human procedure to formal logic, programs, expert
      systems, and governance frameworks.
    appears_in:
    - before-machines
    - formal-logic-to-computation
    - birth-of-ai
    - ai-winters-expert-systems
    - human-systems
  learning_and_scale:
    description: The season shifts from hand-written rules to learning from examples,
      then to scaled general-purpose models.
    appears_in:
    - learning-machines
    - foundation-models
  evaluation_and_trust:
    description: Claims about intelligence become meaningful only when tested against
      tasks, institutions, maintenance, and public trust.
    appears_in:
