    best_for:
      - "orientation"
      - "basic computing chronology"
      - "source discovery"
    limitations:
      - "Do not use alone for causal claims."
      - "Verify disputed priority or technical interpretation elsewhere."
    visual_use:
      reuse: "rights-review-needed"
      notes: "Images and artifact photos require separate rights review before reuse."
    added_for: "Baseline computing chronology for the proposal and future research cards."
    notes: "Good starting map for computing milestones, not an exhaustive historiography."

