schema_version: 1
series: "long-human-road-to-ai"
title: "Source Canon for The Long Human Road to AI"
updated: "2026-06-19"

id_policy:
  pattern: "^src-[a-z0-9]+(-[a-z0-9]+){0,3}$"
  max_length: 31
  stability: "Source IDs are append-only. Deprecate instead of renaming."

authority_classes:
  primary:
    description: "Original paper, patent, artifact record, archival record, official standard, official release, or project document."
    use_for:
      - "original wording"
      - "technical claims"
      - "publication dates"
      - "official governance or process claims"
    limits: "Primary sources still need interpretation; do not infer broad historical meaning from one document alone."
  secondary:
    description: "Historian work, scholarly synthesis, peer-reviewed interpretation, or deeply cited technical history."
    use_for:
      - "context"
      - "causal interpretation"
      - "historiographic disagreement"
      - "connections across fields"
    limits: "Check central interpretations against at least one other source when possible."
  tertiary:
    description: "Museum summary, public timeline, encyclopedia overview, or teaching reference."
    use_for:
      - "orientation"
      - "simple chronology"
      - "source discovery"
      - "reader-facing definitions"
    limits: "Do not use as the only support for disputed causality, priority, or technical interpretation."
  modern-commentary:
    description: "Current data project, public commentary, benchmark summary, policy context, or living report."
    use_for:
      - "current AI context"
      - "public framing"
      - "deployment and adoption trends"
      - "recent governance context"
    limits: "Do not establish historical fact by itself; verify rapidly changing claims with current public sources."

claim_types:
  fact:
    minimum_sources: 1
    rule: "One source may support a simple event, artifact, date, or technical statement. Tertiary-only support is limited to basic chronology."
  interpretation:
    minimum_sources: 2
    rule: "Use at least two sources, preferably including a secondary source. If only one source is available, add a review flag."
  analogy:
    minimum_sources: 1
    rule: "Cite the underlying facts, include analogy_limits, and never treat the analogy as evidence."
  speculation:
    minimum_sources: 1
    rule: "Cite any background fact, mark the speculative step, and do not use speculation to support historical claims."

confidence_states:
  high: "The cited sources directly support the claim, and no known conflict is present."
  medium: "The claim is source-backed but depends on synthesis, source translation, or incomplete coverage."
  low: "The claim is plausible but under-sourced, disputed, or awaiting a stronger source."

uncertainty_states:
  settled: "The available public record is stable for this article's level of detail."
  debated: "Sources disagree or the interpretation is contested."
  speculative: "The card includes future-looking, counterfactual, or weakly evidenced inference."
  analogy-only: "The card is useful as a teaching comparison but not as historical evidence."

source_type_values:
  - archival-record
  - data-reference
  - data-report
  - encyclopedia-entry
  - museum-collection
  - museum-timeline
  - official-guidance
  - original-paper
  - primary-text
  - primary-text-transcription
  - project-document
  - scholarly-history

public_access_values:
  - open-web
  - public-pdf
  - public-repo
  - public-institutional-page
  - public-doi
  - paywalled-public-citation

visual_reuse_values:
  - metadata-only
  - original-diagram
  - public-domain
  - permissive-license
  - rights-review-needed
  - prohibited

default_allow_list_reference:
  config_path: "capabilities/article-lifecycle-router/aura-export/config.yaml"
  snapshot:
    - "github.com"
    - "arxiv.org"
    - "doi.org"
    - "en.wikipedia.org"
    - "docs.python.org"
    - "developer.mozilla.org"
    - "www.w3.org"
    - "semver.org"
    - "python.org"
    - "pkg.go.dev"
    - "docs.rs"

source_entry_contract:
  required_fields:
    - id
    - title
    - url
    - source_type
    - authority
    - publisher
    - accessed
    - status
    - public_access
    - access_notes
    - best_for
    - limitations
    - visual_use
    - added_for
    - notes
  optional_fields:
    - archive_url
    - replacement_ids
    - deprecation_notes
  field_rules:
    id: "Short stable ID matching id_policy.pattern; never rename or recycle."
    title: "Public title of the source."
    url: "Public URL only."
    source_type: "One value from source_type_values."
    authority: "One of primary, secondary, tertiary, modern-commentary."
    publisher: "Public institution, journal, archive, repository, or project name."
    accessed: "Date checked by the worker, YYYY-MM-DD."
    status: "active or deprecated."
    public_access: "One value from public_access_values."
    access_notes: "Explain publicness and note if the domain falls outside the default source allow-list recorded in default_allow_list_reference."
    best_for: "Short list of claim types this source can support."
    limitations: "Short list of claims this source should not support alone."
    visual_use: "Object whose reuse field uses one value from visual_reuse_values."
    added_for: "Why this source entered the canon."
    notes: "Reviewer-facing caution or usage guidance."

canon_lifecycle:
  - "Add new sources before cards cite them."
  - "Do not rename source IDs; downstream cards treat them as stable interfaces."
  - "If replacing a source, keep the original entry, set status to deprecated, and add replacement_ids."
  - "Do not add private, client, personal, or internal sources."
  - "For domains outside the default source allow-list recorded in default_allow_list_reference, public_access and access_notes must justify public citability."
  - "Source additions should be reviewed for publicness, authority class, and fit before article drafting."

minimum_citation_rules:
  - "A fact card needs at least one source; tertiary-only support is acceptable only for simple chronology or orientation."
  - "A causal, technical, or debated historical claim needs a primary or secondary source, or a review flag naming the missing class."
  - "An interpretation card needs at least two sources unless the review flag explains why a single source is temporarily accepted."
  - "An analogy card must cite the underlying facts and include analogy_limits."
  - "A speculation card must not support historical claims."
  - "Modern AI claims require an accessed date and should prefer current public institutional, scholarly, or data sources."

visual_provenance_rules:
  - "Every reused image needs a source URL, creator or institution if known, license or rights statement, and accessed date."
  - "Museum pages may be cited for artifact context, but image reuse depends on the linked rights statement."
  - "Generated or original diagrams must list source_ids that support their factual structure."
  - "Timelines and causal graphs must not imply direct causality unless the cited sources support that relationship."
  - "If visual rights are unclear, use the source only for research and create an original diagram instead."

analogy_boundary_rules:
  - "State what the analogy clarifies."
  - "State where the analogy breaks."
  - "Do not use an analogy to claim direct descent, inevitability, or equivalence."
  - "Flag analogies that may erase labor, institutions, geography, or social context."

