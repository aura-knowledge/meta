claim_map:
  - claim_id: claim-old-ambition
    claim: "The 1955 Dartmouth proposal framed AI as a broad program involving language, abstraction, problem solving, and self-improvement."
    claim_type: "historical-fact"
    sources: ["source-dartmouth"]
    source_posture: "primary-durable"
    volatility: "low"
    recheck_after: null

  - claim_id: claim-fm-def
    claim: "A foundation model is a broadly trained model, generally trained with self-supervision at scale, that can be adapted to many downstream tasks."
    claim_type: "definition"
    sources: ["source-fm-report"]
    source_posture: "secondary-durable"
    volatility: "medium"
    recheck_after: null

  - claim_id: claim-gp-return
    claim: "Foundation models revive general-purpose AI ambition by supporting many tasks from a shared base, but this should not be equated with humanlike understanding."
    claim_type: "interpretation"
    sources: ["source-fm-report", "source-gpt3", "source-helm"]
    source_posture: "synthesis"
    volatility: "medium"
    recheck_after: null

  - claim_id: claim-transformer
    claim: "The Transformer replaced recurrence and convolution with attention for sequence transduction and made training more parallelizable."
    claim_type: "technical-fact"
    sources: ["source-transformer"]
    source_posture: "primary-durable"
    volatility: "low"
    recheck_after: null

  - claim_id: claim-pretrain
    claim: "Broad pretraining enabled models such as BERT and GPT-3 to be adapted or prompted across many tasks."
    claim_type: "technical-synthesis"
    sources: ["source-bert", "source-gpt3", "source-fm-report"]
    source_posture: "primary-plus-synthesis"
    volatility: "medium"
    recheck_after: null

  - claim_id: claim-scale
    claim: "Scaling research made model size, data, and compute explicit variables, while later work emphasized compute-optimal allocation rather than model size alone."
    claim_type: "technical-synthesis"
    sources: ["source-scale", "source-chinchilla"]
    source_posture: "primary-durable"
    volatility: "medium"
    recheck_after: null

  - claim_id: claim-posttrain
    claim: "Instruction tuning and RLHF can improve usefulness and intent-following, but do not eliminate mistakes or alignment limits."
    claim_type: "technical-caveat"
    sources: ["source-rlhf"]
    source_posture: "primary-durable"
    volatility: "medium"
    recheck_after: null

  - claim_id: claim-multimodal
    claim: "Natural-language supervision and multimodal training widened foundation-model behavior beyond text-only tasks."
    claim_type: "technical-synthesis"
    sources: ["source-clip", "source-gpt4", "source-fm-report"]
    source_posture: "primary-plus-synthesis"
    volatility: "medium"
    recheck_after: null

  - claim_id: claim-tools
    claim: "Retrieval, tool use, and reasoning/action loops can extend model behavior by connecting models to external sources, APIs, and environments."
    claim_type: "technical-synthesis"
    sources: ["source-rag", "source-react", "source-toolformer"]
    source_posture: "primary-durable"
    volatility: "medium"
    recheck_after: null

  - claim_id: claim-eval-risk
    claim: "Language-model evaluation needs multi-metric transparency because accuracy alone hides tradeoffs in calibration, robustness, fairness, bias, toxicity, and efficiency."
    claim_type: "evaluation-caveat"
    sources: ["source-helm"]
    source_posture: "primary-durable"
    volatility: "medium"
    recheck_after: null

  - claim_id: claim-aiindex-now
    claim: "As of 2026-06-19, the 2026 AI Index reports rapid changes in AI capabilities, adoption, incidents, and responsible-AI measurement gaps."
    claim_type: "current-state"
    sources: ["source-ai-index26"]
    source_posture: "secondary-current-state"
    volatility: "high"
    recheck_after: "2026-12-31"

  - claim_id: claim-nist-risk
    claim: "As of 2026-06-19, NIST AI 600-1 is the generative AI profile used here for lifecycle risk-management framing."
    claim_type: "current-policy"
    sources: ["source-nist-gai", "source-nist-rmf"]
    source_posture: "official-current-state"
    volatility: "medium"
    recheck_after: "2026-12-31"

  - claim_id: claim-eu-gpai
    claim: "As of 2026-06-19, European Commission pages state that EU general-purpose AI model rules became effective in August 2025 and that the Code of Practice supports compliance."
    claim_type: "current-policy"
    sources: ["source-eu-ai-act", "source-eu-code"]
    source_posture: "official-current-state"
    volatility: "high"
    recheck_after: "2026-12-31"

stale_claim_rules:
  - "Do not use 'latest', 'current', 'frontier', 'state of the art', or 'today' without an as-of date."
  - "Recheck all high-volatility claims before publication after 2026-12-31."
  - "Benchmark claims must name the benchmark and source; do not generalize them to intelligence."
  - "Regulatory claims must cite official sources or be removed."
  - "Product-release claims are out of scope unless needed as dated examples."
