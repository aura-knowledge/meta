schemaVersion: 1
article_slug: "birth-of-ai"
status: "provisional"
accessed: "2026-06-19"
provenance_note: >
  This source map is provisional and source-canon-compatible. It supports issue
  #8 only until issue #5 creates the shared source canon for The Long Human
  Road to AI.

claims:
  - id: "CLAIM-BAI-001"
    summary: "Dartmouth named and consolidated AI as a research field, but did not originate all machine-intelligence work."
    claim_type: "historical-fact-with-boundary"
    confidence: "high"
    source_ids:
      - "source-dartmouth-proposal"
      - "source-dartmouth-institutional"
      - "source-sep-ai"
      - "source-hdsr-dick-ai-history"
    boundaries:
      - "Use birth as title language only with caveats."
      - "Prefer naming, consolidation, or field-forming moment in explanatory prose."
  - id: "CLAIM-BAI-002"
    summary: "Early symbolic AI represented problems as formal structures and used search or inference over those structures."
    claim_type: "technical-explanation"
    confidence: "high"
    source_ids:
      - "source-rand-logic-theory-machine"
      - "source-chm-ai-robotics"
      - "source-mccarthy-common-sense"
      - "source-sep-logic-ai"
    boundaries:
      - "Do not reduce all early AI to logic alone."
      - "Keep search, planning, language, and representation distinct."
  - id: "CLAIM-BAI-003"
    summary: "Early demonstrations were impressive because they made formal reasoning executable, but they were bounded by constrained domains."
    claim_type: "historical-fact-plus-interpretation"
    confidence: "medium-high"
    source_ids:
      - "source-rand-logic-theory-machine"
      - "source-gps-stanford"
      - "source-chm-ai-robotics"
      - "source-mccarthy-common-sense"
    boundaries:
      - "Avoid unqualified claims that early systems understood the world."
  - id: "CLAIM-BAI-004"
    summary: "Early AI optimism was amplified by technical progress, funding proposals, institutions, public demonstrations, and press narratives."
    claim_type: "interpretation"
    confidence: "medium"
    source_ids:
      - "source-dartmouth-proposal"
      - "source-hdsr-dick-ai-history"
      - "source-cornell-perceptron-history"
      - "source-nilsson-quest-ai"
    boundaries:
      - "Explain period optimism without ridicule or presentism."
  - id: "CLAIM-BAI-005"
    summary: "The early field included multiple lineages, including symbolic reasoning, cybernetics, neural approaches, game-playing, and machine-intelligence philosophy."
    claim_type: "historical-interpretation"
    confidence: "medium-high"
    source_ids:
      - "source-turing-archive"
      - "source-sep-ai"
      - "source-hdsr-dick-ai-history"
      - "source-cornell-rosenblatt"
      - "source-chm-ai-robotics"
    boundaries:
      - "Foreground symbolic AI without making it the whole story."

