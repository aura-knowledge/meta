claims:
  - id: "claim-human-001"
    claim: "AI systems that appear automatic at the interface still depend on human work, judgment, evaluation, maintenance, governance, and contestation."
    claim_type: "interpretation"
    confidence: "medium"
    source_status: "sourced"
    source_ids:
      - "src-pai-data-labor"
      - "src-nist-ai-rmf"
    social_boundary: "Show hidden labor without implying every system uses the same labor chain."
    analogy_candidate: "Public utility or library catalog with visible service and hidden maintenance."
    analogy_limits: "AI systems can generate novel outputs and shift across contexts, unlike many stable public utilities."
    visual_candidates:
      - "hidden-labor-stack"
      - "interface-maint-map"
    technical_companion_notes: "Separate data enrichment, evaluation, moderation, red-teaming, monitoring, and governance roles."

  - id: "claim-human-002"
    claim: "Task exposure to generative AI should not be treated as a direct forecast of job replacement."
    claim_type: "interpretation"
    confidence: "medium"
    source_status: "sourced"
    source_ids:
      - "src-ilo-genai-jobs"
      - "src-hai-ai-index"
    social_boundary: "Discuss augmentation, automation, and transition costs without deterministic labor predictions."
    analogy_candidate: "Spreadsheets changed accounting work without making all accounting disappear."
    analogy_limits: "Generative AI applies across language, images, code, and decisions, so its reach differs from spreadsheets."
    visual_candidates:
      - "task-exposure-matrix"
      - "worker-impact-map"
    technical_companion_notes: "Track occupation, task, country-income context, gender, and management choices separately."

  - id: "claim-human-003"
    claim: "Governance frameworks and laws are part of the AI system because they assign duties for risk, transparency, oversight, accountability, and redress."
    claim_type: "interpretation"
    confidence: "medium"
    source_status: "sourced"
    source_ids:
      - "src-nist-ai-rmf"
      - "src-eu-ai-act"
      - "src-oecd-ai-principles"
    social_boundary: "Use official sources and dates; do not provide legal advice."
    analogy_candidate: "Like bridges, medicines, and public records, AI needs standards and contestability when it affects people."
    analogy_limits: "AI systems can be adaptive, privately operated, and embedded across domains, so one-time approval is not enough."
    visual_candidates:
      - "risk-loop"
      - "institution-map"
    technical_companion_notes: "Keep jurisdiction-specific notes separate from general governance principles."

  - id: "claim-human-004"
    claim: "Education, science, and authorship debates about AI are debates about human judgment, evidence, disclosure, and responsibility."
    claim_type: "interpretation"
    confidence: "medium"
    source_status: "sourced"
    source_ids:
      - "src-unesco-genai-edu"
      - "src-oecd-ai-science"
      - "src-usco-ai"
    social_boundary: "Avoid reducing the topic to cheating or productivity; focus on institutional rules and judgment."
    analogy_candidate: "Calculators changed math education but did not remove the need for number sense or proof."
    analogy_limits: "Generative AI can produce fluent text, code, images, and evidence-like material, making attribution harder."
    visual_candidates:
      - "judgment-ladder"
      - "classroom-lab-decision-table"
    technical_companion_notes: "Separate education policy, research integrity, authorship, and copyright law."

  - id: "claim-human-005"
    claim: "AI benefits depend on material access conditions: connectivity, devices, language, skills, compute, affordability, energy systems, and local institutions."
    claim_type: "interpretation"
    confidence: "medium"
    source_status: "sourced"
    source_ids:
      - "src-itu-facts-2025"
      - "src-worldbank-digital-2023"
      - "src-iea-energy-ai"
    social_boundary: "Avoid universal access claims; distinguish connectivity, affordability, quality, language, and energy constraints."
    analogy_candidate: "Printing expanded access only where paper, presses, literacy, distribution, and institutions could support it."
    analogy_limits: "AI infrastructure is networked, compute-heavy, and globally concentrated in different ways than print."
    visual_candidates:
      - "access-stack"
      - "benefit-cost-map"
    technical_companion_notes: "Track global access data separately from data-centre energy projections and local grid impacts."

  - id: "claim-human-006"
    claim: "Public trust is a design constraint because adoption depends on people's ability to understand, challenge, and rely on AI-mediated systems."
    claim_type: "interpretation"
    confidence: "medium"
    source_status: "sourced"
    source_ids:
      - "src-pew-ai-topic"
      - "src-nist-ai-rmf"
      - "src-oecd-ai-principles"
    social_boundary: "Use survey findings as context, not universal sentiment. Avoid global claims from U.S. survey data."
    analogy_candidate: "Courts and public health systems rely on procedures, not only expertise."
    analogy_limits: "AI accountability often runs through private platforms and opaque supply chains."
    visual_candidates:
      - "trust-triangle"
      - "contestability-path"
    technical_companion_notes: "Separate user trust, institutional trust, and affected-person rights."

open_editorial_questions:
  - id: "question-human-001"
    question: "Should the article be standalone, or should these claim cards become recurring sidebars across the whole series?"
    review_flag: "series-structure"
  - id: "question-human-002"
    question: "Which earlier historical examples should anchor the article: human computers, punched-card labor, telegraph operators, clerks, libraries, standards bodies, or factories?"
    review_flag: "historical-fit"
  - id: "question-human-003"
    question: "Which visual should lead: hidden labor stack, access stack, or trust triangle?"
    review_flag: "visual-fit"
  - id: "question-human-004"
    question: "Which jurisdiction-specific governance examples should be included without turning the article into legal analysis?"
    review_flag: "governance-boundary"

