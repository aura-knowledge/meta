claims:
  - id: "claim-001"
    claim: "Algebraic and symbolic treatments of logic helped make reasoning inspectable and manipulable as formal symbol systems."
    claim_type: "interpretive-bridge"
    confidence: "high"
    source_ids:
      - "src-boole-laws-thought"
      - "src-sep-frege-logic"
    limits_or_counterclaim: "This does not mean logic alone created computation or AI."
    article_use: "Opening section on symbols and rules."
    review_flags:
      - "Watch for single-founder framing."

  - id: "claim-002"
    claim: "Frege is often credited with modern quantificational logic, but the history of modern logic includes contested attribution and related work by Boole, De Morgan, Schroder, Peirce, Venn, and others."
    claim_type: "historical-fact"
    confidence: "high"
    source_ids:
      - "src-sep-frege-logic"
    limits_or_counterclaim: "Use this as an attribution caution, not as a detour into every contributor."
    article_use: "Caveat box on great-man history."
    review_flags:
      - "Check non-Western or underrepresented context if the article broadens beyond this package."

  - id: "claim-003"
    claim: "The formalist ambition around mathematical foundations and decision procedures created the problem setting in which computability could be made precise."
    claim_type: "interpretive-bridge"
    confidence: "medium-high"
    source_ids:
      - "src-hilbert-problems"
      - "src-sep-church-turing"
      - "src-sep-church"
    limits_or_counterclaim: "Hilbert's 1900 problems are not identical to the later Entscheidungsproblem; explain this carefully."
    article_use: "Bridge from formal logic to computability."
    review_flags:
      - "Avoid compressing three decades of logic into one sentence."

  - id: "claim-004"
    claim: "Godel's incompleteness theorems showed that any consistent, effectively axiomatized formal system strong enough for elementary arithmetic has limits, which complicates the dream of complete formal foundations."
    claim_type: "historical-fact"
    confidence: "high"
    source_ids:
      - "src-sep-godel"
    limits_or_counterclaim: "Do not generalize into vague claims that machines, minds, or AI are impossible."
    article_use: "Boundary marker before computability."
    review_flags:
      - "Keep proof details out of the main article."

  - id: "claim-005"
    claim: "Church, Turing, and Post offered different formalizations of effective procedure or symbolic process, helping turn computation into a mathematical subject."
    claim_type: "historical-fact"
    confidence: "high"
    source_ids:
      - "src-sep-church"
      - "src-sep-church-turing"
      - "src-turing-1936"
      - "src-post-1936"
    limits_or_counterclaim: "Do not present Turing as the only route to computability."
    article_use: "Core computability section."
    review_flags:
      - "Check Church/Turing/Post chronology."

  - id: "claim-006"
    claim: "The Church-Turing thesis concerns effective methods and is often misunderstood when treated as a claim about all physical machines or minds."
    claim_type: "technical-explanation"
    confidence: "high"
    source_ids:
      - "src-sep-church-turing"
    limits_or_counterclaim: "Avoid physical or psychological versions unless explicitly marked as outside this article."
    article_use: "Technical companion caveat."
    review_flags:
      - "Flag any overreach about brains or AI."

  - id: "claim-007"
    claim: "Shannon's switching-circuit work connected Boolean algebra to relay and switching circuit design, helping make logic part of digital engineering."
    claim_type: "historical-fact"
    confidence: "high"
    source_ids:
      - "src-shannon-switching"
      - "src-chm-digital-logic"
    limits_or_counterclaim: "Logic gates implement operations; they do not understand propositions."
    article_use: "Bridge from formal symbols to physical circuits."
    review_flags:
      - "Avoid saying switches learned in a literal sense."

  - id: "claim-008"
    claim: "Shannon's communication theory provided a mathematical treatment of messages, channels, noise, and information, but it is not a theory of semantic meaning."
    claim_type: "technical-explanation"
    confidence: "high"
    source_ids:
      - "src-shannon-info-1948"
      - "src-shannon-info-pdf"
    limits_or_counterclaim: "Information in this sense is not wisdom, truth, or understanding."
    article_use: "Information section and analogy boundary box."
    review_flags:
      - "Keep semantic caveat visible."

  - id: "claim-009"
    claim: "Cybernetics supplied a language of feedback, control, and communication for thinking about machines and organisms, but feedback alone is not intelligence."
    claim_type: "interpretive-bridge"
    confidence: "medium-high"
    source_ids:
      - "src-wiener-cybernetics"
      - "src-britannica-cybernetics"
    limits_or_counterclaim: "Do not let cybernetics become a broad systems-theory article."
    article_use: "Bounded feedback/control/communication section."
    review_flags:
      - "Check scope creep."

  - id: "claim-010"
    claim: "Stored-program architecture can clarify how instructions become reusable machine data, but its attribution should not be credited to one person alone."
    claim_type: "caveat"
    confidence: "medium"
    source_ids:
      - "src-edvac-first-draft"
    limits_or_counterclaim: "Use only as a short optional note; this article is not a hardware architecture history."
    article_use: "Optional technical companion sidebar."
    review_flags:
      - "Avoid von Neumann-only attribution."

  - id: "claim-011"
    claim: "In Turing's 1936 context, computation referred to human computation by people following effective methods, which is why the article should bridge carefully from human rule-following to machine models."
    claim_type: "technical-explanation"
    confidence: "high"
    source_ids:
      - "src-sep-church-turing"
    limits_or_counterclaim: "Do not imply all human thought is rote symbol manipulation."
    article_use: "Computability section and technical companion note."
    review_flags:
      - "Keep the historical meaning of computer distinct from modern digital computer."

