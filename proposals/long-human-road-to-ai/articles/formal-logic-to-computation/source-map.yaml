    limits_or_counterclaim: "Keep the thesis about effective methods; do not turn it into a claim about all physical machines or minds."

  - id: "src-turing-1936"
    title: "On Computable Numbers, with an Application to the Entscheidungsproblem"
    author_or_editor: "Alan M. Turing"
