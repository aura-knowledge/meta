    use: "Independent computability context and convergence on formal symbol processes."
    limits_or_counterclaim: "Keep short in the main article unless issue #5 expands the computability source canon."

  - id: "src-shannon-switching"
    title: "A Symbolic Analysis of Relay and Switching Circuits"
    author_or_editor: "Claude E. Shannon"
