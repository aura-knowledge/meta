schemaVersion: 1
article:
  id: "article:formal-logic-to-computation"
  slug: "formal-logic-to-computation"
  title: "From Formal Logic to Computation: The Mathematical Road to AI"
  thesis: "Modern computing and AI became thinkable partly because humans developed formal symbol systems, logic, computability, and information concepts that turned reasoning into something machines could represent and execute."
  maturity: "seed"
  audience:
    - "general"
    - "students"
    - "agents"
  tags:
    - "ai-history"
    - "formal-logic"
    - "computability"
    - "information-theory"
    - "cybernetics"
  source_canon_status: "canon-normalized"
  sanitized_summary: "This article package explains how formal reasoning, symbolic notation, Boolean algebra, computability, information theory, and feedback/control concepts made later computing and AI ideas possible and legible. It uses public historical and technical sources only, avoids private anecdotes, and treats analogies as teaching devices rather than evidence of inevitability."

privacy:
  acknowledgment: true
  abstraction_examples:
    - original: "A session discussion about using chronology and analogies to explain AI."
      abstracted: "A public article work package about formal reasoning, computation, and information concepts."
  public_only_notes:
    - "No client names, project codenames, proprietary code, internal URLs, personal information, or non-public sources are included."
    - "All URLs point to public source pages, public metadata, or public scans."

sources:
  - id: "src-sep-leibniz-logic"
    title: "Leibniz's Influence on 19th Century Logic"
    author_or_editor: "Stanford Encyclopedia of Philosophy"
    year: 2009
    url: "https://plato.stanford.edu/entries/leibniz-logic-influence/"
    type: "encyclopedia-entry"
    source_tier: "tertiary"
    accessed: "2026-06-19"
    public_url_status: "public"
    use: "Background only for earlier dreams of symbolic reasoning and universal characteristic."
    limits_or_counterclaim: "Do not overstate Leibniz as a direct origin of modern computation; use as a prehistory note only."

  - id: "src-boole-laws-thought"
    title: "An Investigation of the Laws of Thought"
    author_or_editor: "George Boole"
    year: 1854
    url: "https://archive.org/details/investigationofl01bool"
    type: "book-scan"
    source_tier: "primary"
    accessed: "2026-06-19"
    public_url_status: "public-scan"
