    source_tier: "primary"
    accessed: "2026-06-19"
    public_url_status: "public-metadata-paywalled-pdf"
    use: "Primary anchor for Turing machines and the decision-problem result."
    limits_or_counterclaim: "Use DOI metadata plus public secondary context; avoid quoting inaccessible text from paywalled copy."

  - id: "src-post-1936"
    title: "Finite Combinatory Processes - Formulation 1"
    author_or_editor: "Emil L. Post"
