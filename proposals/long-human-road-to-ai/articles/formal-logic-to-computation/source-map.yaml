analogies:
  - id: "analogy-recipe"
    explains: "How formal rules make a sequence public, inspectable, and repeatable."
    use_in_section: "Symbols Made Reasoning Portable"
    breaks_when: "A recipe tolerates judgment and variation; a formal system has stricter syntax and inference rules."
    claim_type: "analogy"
  - id: "analogy-rulebook"
    explains: "Why a formal system can be useful while still not answering every question from inside itself."
    use_in_section: "Formal Systems Exposed Both Power and Limits"
    breaks_when: "Godel's theorems are precise mathematical results, not a general claim that rules are always incomplete."
    claim_type: "analogy"
  - id: "analogy-dance-card"
    explains: "How a procedure can specify steps independent of a particular performer."
    use_in_section: "Computability Turned Procedure Into an Object"
    breaks_when: "Computability models idealized rule-following, not physical costs or engineering constraints."
    claim_type: "analogy"
  - id: "analogy-switch-network"
    explains: "How physical on/off devices can implement yes/no logic."
    use_in_section: "Logic Became Physical in Switching Circuits"
    breaks_when: "Switches do not understand propositions or reasons."
    claim_type: "analogy"
  - id: "analogy-noisy-room"
    explains: "How channels and noise shape message transmission."
    use_in_section: "Information Became Measurable"
    breaks_when: "Shannon information is not semantic meaning."
    claim_type: "analogy"
  - id: "analogy-thermostat"
    explains: "How feedback compares a current state to a target and acts on the difference."
    use_in_section: "Feedback Made Machine Behavior Feel Less Static"
    breaks_when: "Feedback control is not intelligence by itself."
    claim_type: "analogy"

