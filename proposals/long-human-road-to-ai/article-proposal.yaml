claims:
  - "The series should explain computers and AI through recurring human capabilities rather than through hardware and software categories alone."
  - "A technical companion should preserve chronology, source detail, and agent-readable milestone structure without forcing the human-facing series to become academic."
  - "Analogies should be used as teaching devices with explicit limits, not as evidence for historical claims."
