title: "The Long Human Road to AI"
slug: "long-human-road-to-ai"
thesis: "Artificial intelligence is easier to understand when it is presented as the latest chapter in a much older human story: our repeated effort to extend memory, calculation, communication, measurement, coordination, prediction, and delegation beyond the limits of one person."
audience:
