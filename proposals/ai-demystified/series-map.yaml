series:
  title: "AI, De-Mystified"
  positioning: "Plain-language AI concept literacy with a recurring anti-hype check."
  home_recommendation: "Publish inside Aura Knowledge first; consider a separate microsite only after several articles prove the series cadence and audience."
  recurring_sections:
    - "Plain English Meaning"
    - "Existing Concept It Resembles"
    - "What Is Actually New?"
    - "How It Works In Practice"
    - "Where It Helps"
    - "Where It Fails"
    - "Academic Connections"
    - "Practical Checklist"
    - "The De-Hype Check"
    - "Open Questions"
  articles:
    - slug: "loops-vs-goals"
      title: "Loops vs Goals: The Difference Between Repetition and Direction in AI Agents"
      status: "recommended-first"
      brief: "Goals define what an AI system is trying to achieve; loops define how it repeatedly makes progress."
      practical_examples:
        - "A coding agent repeatedly runs tests, reads failures, edits code, and checks again."
        - "A research assistant gathers sources, summarizes findings, checks gaps, and refines questions."
      academic_connections:
        - "control loops"
        - "reinforcement learning"
        - "agent architectures"
        - "plan-act-observe cycles"
    - slug: "context-management"
      title: "Context Management: What the AI Sees Right Now"
      status: "candidate"
      brief: "Context management decides what information belongs in the model's current working window."
      academic_connections:
        - "working memory"
        - "attention"
        - "information retrieval"
        - "compression"
    - slug: "memory-vs-context"
      title: "Memory vs Context: What Should Survive the Conversation?"
      status: "candidate"
      brief: "Context is immediate working material; memory is selected information that persists across time."
      academic_connections:
        - "episodic memory"
        - "semantic memory"
        - "knowledge bases"
        - "retrieval policies"
    - slug: "prompt-engineering"
      title: "Prompt Engineering: Instruction Design, Not Magic Words"
      status: "candidate"
      brief: "Prompt engineering is the practice of structuring instructions, examples, constraints, and evaluation criteria."
      academic_connections:
        - "instruction following"
        - "few-shot learning"
        - "human-computer interaction"
        - "task framing"
    - slug: "prompt-caching"
      title: "Prompt Caching: Reusing Stable Context"
      status: "candidate"
      brief: "Prompt caching reduces latency and cost by reusing repeated prompt or context prefixes when supported by the model provider."
      academic_connections:
        - "caching"
        - "memoization"
        - "systems optimization"
        - "latency-cost tradeoffs"
    - slug: "evaluations"
      title: "Evaluations: How We Know an AI Workflow Improved"
      status: "candidate"
      brief: "Evaluations turn vague quality claims into testable checks."
      academic_connections:
        - "benchmarking"
        - "measurement"
        - "experimental design"
        - "error analysis"
    - slug: "agents"
      title: "Agents: Goal-Directed AI Systems That Use Tools"
      status: "candidate"
      brief: "Agents combine goals, loops, tool use, context, memory, and evaluation to work beyond a single response."
      academic_connections:
        - "autonomous agents"
        - "planning"
        - "tool use"
        - "human-in-the-loop systems"
    - slug: "planning-and-reflection"
      title: "Planning and Reflection: How AI Breaks Down and Revises Work"
      status: "candidate"
      brief: "Planning decomposes work before action; reflection checks results and adjusts the next step."
      academic_connections:
        - "task decomposition"
        - "metacognition"
        - "self-refinement"
        - "search"
    - slug: "retrieval-augmented-generation"
      title: "Retrieval-Augmented Generation: Looking Things Up Before Answering"
      status: "candidate"
      brief: "Retrieval-augmented generation gives the model relevant external material instead of relying only on its trained parameters or the current prompt."
      academic_connections:
        - "information retrieval"
        - "open-book question answering"
        - "knowledge-intensive NLP"
        - "source grounding"
    - slug: "tool-use"
      title: "Tool Use: When the Model Calls Something Outside Itself"
      status: "candidate"
      brief: "Tool use lets an AI system call search, code execution, files, APIs, calculators, browsers, or other external capabilities."
      academic_connections:
        - "function calling"
        - "affordances"
        - "action selection"
        - "human-computer interaction"
    - slug: "long-running-sessions"
      title: "Long-Running Sessions: Keeping AI Work Coherent Over Time"
      status: "candidate"
      brief: "Long-running sessions need goals, summaries, memory, checkpoints, context pruning, and stopping rules to avoid drift."
      academic_connections:
        - "workflow orchestration"
        - "state management"
        - "bounded rationality"
        - "process control"
    - slug: "multi-agent-systems"
      title: "Multi-Agent Systems: When More Than One AI Worker Is Involved"
      status: "candidate"
      brief: "Multi-agent systems split work across specialized agents, but add coordination, communication, evaluation, and cost tradeoffs."
      academic_connections:
        - "distributed systems"
        - "coordination"
        - "debate"
        - "ensemble methods"
    - slug: "fine-tuning"
      title: "Fine-Tuning: Teaching a Model a Narrower Behavior"
      status: "candidate"
      brief: "Fine-tuning changes model behavior through additional training, unlike prompting or retrieval, which change what the model sees at runtime."
      academic_connections:
        - "transfer learning"
        - "supervised learning"
        - "alignment"
        - "domain adaptation"
    - slug: "reasoning-models"
      title: "Reasoning Models: Slower Thinking, Better Checks?"
      status: "candidate"
      brief: "Reasoning models spend more compute on intermediate problem-solving steps, often improving complex tasks while increasing latency and cost."
      academic_connections:
        - "deliberation"
        - "chain-of-thought"
        - "test-time compute"
        - "search and verification"
